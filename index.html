<!DOCTYPE html>
<html lang="zh-CN" class="io-grey-mode">
<head>
<meta charset="UTF-8">
<meta name="renderer" content="webkit"/>
<meta name="force-rendering" content="webkit"/>
<meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI工具大全 - 1000+AI工具导航</title>
<meta name="theme-color" content="#f9f9f9" />
<meta name="keywords" content="AI工具,AI导航,AI写作,AI绘画,AI视频,AI编程,AI聊天,AI工具集" />
<meta name="description" content="AI工具大全官网收录了国内外数百个AI工具，该导航网站包括AI写作工具、AI图像生成和背景移除、AI视频制作、AI音频转录、AI辅助编程、AI音乐生成、AI绘画设计、AI对话聊天等AI工具集合大全，以及AI学习开发的常用网站、框架和模型，帮助你加入人工智能浪潮，自动化高效完成任务！" />
<link rel="shortcut icon" href="assets/favicon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://at.alicdn.com/t/c/font_4016659_bcqo253fh2d.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="sidebar" class="sticky sidebar-nav fade">
    <div class="modal-dialog h-100 sidebar-nav-inner">
      <div class="sidebar-logo border-bottom border-color">
        <div class="logo overflow-hidden">
        </div>
      </div>
      <div class="sidebar-menu flex-fill">
        <div class="sidebar-scroll">
          <div class="sidebar-menu-inner">
            <ul id="sidebarUl"></ul>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="main-content flex-fill">
    <div class="no-big-header header-nav">
      <div id="header" class="page-header sticky">
        <div class="navbar navbar-expand-md">
          <div class="container-fluid p-0 position-relative">
            <div class="collapse navbar-collapse order-2 order-md-1">
              <div class="header-mini-btn">
                <label>
                  <input id="mini-button" type="checkbox" checked="checked">
                  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path class="line--1" d="M0 40h62c18 0 18-20-17 5L31 55"></path>
                    <path class="line--2" d="M0 50h80"></path>
                    <path class="line--3" d="M0 60h62c18 0 18 20-17-5L31 45"></path>
                  </svg>
                </label>
              </div>
              <ul class="navbar-nav navbar-top site-menu mr-4" id="topMenu">
                <li class="menu-item menu-item-has-children">
              </ul>
            </div>
          </div>
        </div>
      </div>
      <div class="placeholder"></div>
    </div>

    <div class="header-big no-bg mb-4">
      <div class="s-search">
        <div id="search" class="s-search mx-auto">
          <div class="text-center mb-3">
            <!-- 大Logo已移除 -->
          </div>
          <div id="search-list-menu">
            <div class="s-type text-center">
              <div class="s-type-list big tab-auto-scrollbar overflow-x-auto">
                <div class="anchor" style="position:absolute;left:50%;opacity:0"></div>
                <label class="active" data-page="home" data-id="group-a"><span>常用</span></label>
                <label data-page="home" data-id="group-b"><span>搜索</span></label>
                <label data-page="home" data-id="group-d"><span>社区</span></label>
                <label data-page="home" data-id="group-f"><span>图片</span></label>
                <label data-page="home" data-id="group-e"><span>生活</span></label>
              </div>
            </div>
          </div>
          <form action="javascript:void(0)" method="get" class="super-search-fm">
            <input type="text" id="search-text" class="form-control smart-tips search-key" placeholder="输入关键词搜索AI工具" style="outline:0" autocomplete="off">
            <button type="submit" id="btn_search" onclick="doSearch()"><i class="iconfont icon-search"></i></button>
          </form>
          <div id="search-list" class="hide-type-list">
            <div class="search-group justify-content-center group-a s-current">
              <ul class="search-type tab-auto-scrollbar overflow-x-auto">
                <li><input checked hidden type="radio" name="type" data-page="home" id="type-zhannei" value=""><label for="type-zhannei"><span class="text-muted">站内</span></label></li>
                <li><input hidden type="radio" name="type" data-page="home" id="type-bing" value="https://cn.bing.com/search?q=%s%"><label for="type-bing"><span class="text-muted">Bing</span></label></li>
                <li><input hidden type="radio" name="type" data-page="home" id="type-baidu" value="https://www.baidu.com/s?wd=%s%"><label for="type-baidu"><span class="text-muted">百度</span></label></li>
                <li><input hidden type="radio" name="type" data-page="home" id="type-google" value="https://www.google.com/search?q=%s%"><label for="type-google"><span class="text-muted">Google</span></label></li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 分类面包屑导航（点击分类时显示） -->
    <div class="container container-lg" id="catBarContainer" style="display:none">
      <div class="row" style="margin:0">
        <div class="col-12" style="padding:0">
          <h4 class="text-gray text-lg mb-4" id="catTitle">
            <i class="site-tag iconfont icon-tag icon-lg mr-1"></i>
            <span id="catNameSpan">全部工具</span>
            <small class="text-muted" id="catCountSpan"></small>
          </h4>
        </div>
      </div>
    </div>

    <div id="content" class="container container-lg">
      <div class="content-wrap">
        <div class="content-layout">
          <div class="row" id="toolGrid"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
