<script>
(function() {
  var cats = {};
  var catIcons = {
    'AI办公':'\uD83D\uDCC4','AI绘图':'\uD83C\uDFA8','AI视频':'\uD83C\uDFAC','AI写作':'\u270D\uFE0F',
    'AI设计':'\uD83C\uDFA8','AI编程':'\uD83D\uDCBB','AI智能体':'\uD83E\uDD16','对话大模型':'\uD83D\uDCAC',
    'AI音乐/音频':'\uD83C\uDFB5','AI搜索':'\uD83D\uDD0D','AI开发':'\u2699\uFE0F','AI学习':'\uD83D\uDCDA',
    'AI模型':'\uD83E\uDDE0','AI检测':'\uD83D\uDD0D','AI提示词':'\uD83D\uDCDD','AI副业':'\uD83D\uDCB0',
    '资源与社区':'\uD83D\uDCC1','AI音乐':'\uD83C\uDFB5','更多资源':'\uD83D\uDCC1'
  };
  for (var i = 0; i < toolsData.length; i++) {
    var cl = toolsData[i].categoryLabel;
    if (!cats[cl]) cats[cl] = {count:0, cat:toolsData[i].category};
    cats[cl].count++;
  }
  var sorted = Object.keys(cats).sort(function(a,b){return cats[b].count - cats[a].count});
  var grid = document.getElementById('categoryGrid');
  var html = '';
  for (var i = 0; i < sorted.length; i++) {
    var cl = sorted[i];
    var c = cats[cl];
    html += '<a href="/?cat=' + c.cat + '" class="cat-card">';
    html += '<div class="cat-icon">' + (catIcons[cl] || '\uD83E\uDD16') + '</div>';
    html += '<div class="cat-name">' + cl + '</div>';
    html += '<div class="cat-count">' + c.count + ' \u6B3E\u5DE5\u5177</div>';
    html += '</a>';
  }
  grid.innerHTML = html;
  document.getElementById('totalCount').textContent = toolsData.length;
})();
</script>
