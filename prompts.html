.prompt-cont{max-width:1000px;margin:0 auto}
.prompt-hero{text-align:center;padding:20px 20px 10px}

.prompt-hero p{color:#64748b;font-size:13px}
.prompt-search{margin:0 auto 12px;max-width:400px}
.prompt-search input{width:100%;padding:8px 14px;border:1px solid #e2e8f0;border-radius:8px;outline:none;font-size:13px;background:#fff}
.prompt-search input:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.12)}
.prompt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px}
.prompt-card{padding:12px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;transition:all .15s}
.prompt-card:hover{border-color:#c4b5fd;box-shadow:0 3px 10px rgba(99,102,241,.1);transform:translateY(-1px)}
.prompt-card .p-icon{font-size:20px;margin-bottom:4px}
.prompt-card .p-name{font-size:14px;font-weight:600;color:#1e293b}
.prompt-card .p-desc{font-size:12px;color:#64748b;margin-top:2px}
.prompt-card .p-count{font-size:11px;color:#a78bfa;margin-top:2px}
.prompt-detail{display:none;margin-top:8px}
.prompt-detail.show{display:block}
.prompt-detail .p-item{padding:10px 12px;margin-bottom:6px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px}
.prompt-detail .p-item .p-title{font-size:13px;font-weight:600;color:#1e293b}
.prompt-detail .p-item .p-content{font-size:12px;color:#475569;margin-top:4px;line-height:1.6;white-space:pre-wrap}
.prompt-detail .p-item .copy-btn{padding:3px 10px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:4px;font-size:11px;cursor:pointer;margin-top:4px}
.prompt-detail .p-item .copy-btn:hover{opacity:.9}
.prompt-back{display:none;margin-bottom:10px;color:#667eea;cursor:pointer;font-size:13px}
.prompt-back.show{display:inline-block}
.tag-bar{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.tag-btn{padding:4px 10px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;font-size:12px;cursor:pointer;color:#475569}
.tag-btn:hover{border-color:#a78bfa;background:#f5f3ff}
.tag-btn.active{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-color:transparent}

<script>
var currentTag = 'all';
function filterPrompts() {
  var q = (document.getElementById('promptSearch').value || '').trim().toLowerCase();
  var container = document.getElementById('promptContainer');
  var tagBar = document.getElementById('tagBar');
  var html = '';
  var tagHtml = '<button class="tag-btn' + (currentTag === 'all' ? ' active' : '') + '" onclick="currentTag=\'all\';filterPrompts()">🏷️ 全部</button>';
  for (var i = 0; i < PROMPTS_DATA.length; i++) {
    var p = PROMPTS_DATA[i];
    tagHtml += '<button class="tag-btn' + (currentTag === p.k ? ' active' : '') + '" onclick="currentTag=\'' + p.k + '\';filterPrompts()">' + p.i + ' ' + p.n + '</button>';
    if (currentTag !== 'all' && currentTag !== p.k) continue;
    var items = p.items;
    if (q) {
      items = [];
      for (var j = 0; j < p.items.length; j++) {
        if (p.items[j].t.toLowerCase().indexOf(q) >= 0 || p.items[j].c.toLowerCase().indexOf(q) >= 0) items.push(p.items[j]);
      }
    }
    if (items.length === 0) continue;
    html += '<div class="prompt-card" onclick="toggleDetail(\'pd' + i + '\')"><div class="p-icon">' + p.i + '</div><div class="p-name">' + p.n + '</div><div class="p-desc">' + p.d + '</div><div class="p-count">📋 ' + items.length + '条</div><span style="float:right;color:#94a3b8;font-size:12px">点击展开 ➤</span></div>';
    html += '<div class="prompt-detail" id="pd' + i + '">';
    for (var j = 0; j < items.length; j++) {
      var it = items[j];
      html += '<div class="p-item"><div class="p-title">' + it.t + '</div><div class="p-content" id="pc' + i + '_' + j + '">' + it.c + '</div><button class="copy-btn" onclick="copyPrompt(\'pc' + i + '_' + j + '\')">📋 复制</button></div>';
    }
    html += '</div>';
  }
  tagBar.innerHTML = tagHtml;
  container.innerHTML = html || '<div style="text-align:center;padding:20px;color:#94a3b8">没有找到匹配的提示词</div>';
}
function toggleDetail(id) { var el = document.getElementById(id); if (el) { el.classList.toggle('show'); var back = document.getElementById('promptBack'); if (back) back.classList.toggle('show', !!document.querySelector('.prompt-detail.show')); } }
function backToList() { var details = document.querySelectorAll('.prompt-detail.show'); for (var i = 0; i < details.length; i++) details[i].classList.remove('show'); document.getElementById('promptBack').classList.remove('show'); }
function copyPrompt(id) { var el = document.getElementById(id); if (!el) return; var text = el.textContent; var ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); alert('✅ 已复制到剪贴板'); }
filterPrompts();
</script>
