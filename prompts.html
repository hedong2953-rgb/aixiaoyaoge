<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🏮</text></svg>">
<meta name="description" content="各行业AI提示词大全">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4192236532369703" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;background:#f5f6fa;color:#333}
.nav{background:linear-gradient(135deg,#1a1a2e,#0f3460);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav .logo{color:#fff;font-size:20px;font-weight:700;text-decoration:none}
.nav a{color:rgba(255,255,255,.85);text-decoration:none;font-size:15px;padding:6px 14px;border-radius:20px}
.nav a:hover{background:rgba(255,255,255,.15);color:#fff}
.nav .sel{background:rgba(255,255,255,.1);color:#fff}
.cont{max-width:1200px;margin:0 auto;padding:20px 16px}
.hero{text-align:center;padding:30px 20px}
.hero h1{font-size:30px;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.hero p{font-size:16px;color:#666;max-width:600px;margin:0 auto}
.search{max-width:500px;margin:0 auto 20px;position:relative}
.search input{width:100%;padding:10px 40px 10px 16px;border:2px solid #ddd;border-radius:20px;font-size:15px;outline:none;transition:.3s}
.search input:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.15)}
.search .ic{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:16px;color:#999;pointer-events:none}
.cats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;justify-content:center}
.cats button{padding:6px 16px;border:1px solid #ddd;border-radius:16px;background:#fff;cursor:pointer;font-size:13px;color:#555;transition:.3s}
.cats button:hover{border-color:#667eea;color:#667eea}
.cats .on{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(102,126,234,.3)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:30px}
.card{background:#fff;border-radius:10px;padding:18px;cursor:pointer;transition:.3s;box-shadow:0 2px 6px rgba(0,0,0,.05);border:1px solid #eee;position:relative}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(102,126,234,.12);border-color:#667eea}
.card .ico{font-size:32px;margin-bottom:8px;display:block}
.card h3{font-size:15px;font-weight:700;margin-bottom:4px;color:#333}
.card .ct{font-size:12px;color:#999;margin-bottom:6px}
.card .ds{font-size:12px;color:#666;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bdg{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:10px;padding:2px 8px;border-radius:8px}
.det{display:none}
.det .bk{display:inline-block;padding:8px 16px;background:#fff;border:1px solid #ddd;border-radius:20px;cursor:pointer;font-size:13px;margin-bottom:16px;color:#666}
.det .bk:hover{background:#f5f5f5;color:#333}
.det .dt{font-size:22px;font-weight:700;margin-bottom:16px}
.it{border:1px solid #eee;border-radius:8px;padding:14px;margin-bottom:10px;background:#fff}
.it:hover{border-color:#667eea;box-shadow:0 2px 8px rgba(102,126,234,.08)}
.it .pt{font-size:14px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.it pre{background:#f8f9ff;border:1px solid #e8e8f0;border-radius:6px;padding:12px;font-size:12px;line-height:1.5;overflow-x:auto;white-space:pre-wrap;word-break:break-all;font-family:monospace;margin-bottom:6px;color:#444}
.it .cp{padding:5px 12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:12px;transition:.3s}
.it .cp:hover{opacity:.9;transform:scale(1.05)}
.it .dn{background:#52c41a}
.footer{background:linear-gradient(135deg,#1a1a2e,#0f3460);color:rgba(255,255,255,.7);padding:24px 20px;text-align:center;margin-top:30px}
.footer a{color:rgba(255,255,255,.8);text-decoration:none;margin:0 8px;font-size:13px}
.footer a:hover{color:#fff}
.footer p{margin-top:10px;font-size:12px}
@media(max-width:768px){.grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}.nav a{font-size:13px;padding:4px 8px}}
</style>
</head>
<body>
<div class="nav">
  <a href="/" class="logo">🏮 逍遥AI</a>
  <div>
    <a href="/">🔥首页</a>
    <a href="/categories.html">📂分类</a>
    <a href="/prompts.html" class="sel">💡提示词</a>
    <a href="/news.html">📰资讯</a>
  </div>
</div>

<div id="main">
<div class="cont">
  <div class="hero"><h1>💡 AI提示词大全</h1><p>覆盖各行业的AI提示词模板，一键复制，让AI成为你的行业专家</p></div>
  <div class="search"><input type="text" id="si" placeholder="搜索行业或提示词..." oninput="gs()"><span class="ic">🔍</span></div>
  <div class="cats" id="cats"></div>
  <div class="grid" id="g"></div>
</div>
</div>

<div id="det" class="det">
<div class="cont">
  <button class="bk" onclick="bk()">&#8592; 返回列表</button>
  <div class="dt" id="dt"></div>
  <div id="pl"></div>
</div>
</div>

<div class="footer">
  <div>
    <a href="/">🔥首页</a>
    <a href="/categories.html">📂全部分类</a>
    <a href="/prompts.html">💡提示词</a>
    <a href="/news.html">📰AI资讯</a>
    <a href="/about.html">关于我们</a>
    <a href="/privacy.html">隐私政策</a>
  </div>
  <p>&copy; 2026 aixiaoyaoge.top</p>
</div>

<script src="prompts_data.js"></script>
<script>
var fl = 'all', sr = '';
function rd() {
  var it = PROMPTS_DATA;
  if (fl !== 'all') it = it.filter(function(x){return x.k===fl});
  if (sr) { var s = sr.toLowerCase(); it = it.filter(function(x){return x.n.toLowerCase().indexOf(s)>=0||x.d.toLowerCase().indexOf(s)>=0}); }
  var g = document.getElementById('g'); g.innerHTML = '';
  if (!it.length) { var p = document.createElement('p'); p.style.cssText = 'color:#999;text-align:center;padding:40px'; p.textContent = '没有找到匹配的行业 😅'; g.appendChild(p); return; }
  for (var i = 0; i < it.length; i++) {
    var d = it[i];
    var c = document.createElement('div'); c.className = 'card';
    c.onclick = function(k){return function(){sd(k)}}(d.k);
    c.innerHTML = '<span class="bdg">'+d.c+'条</span><span class="ico">'+d.i+'</span><h3>'+d.n+'</h3><div class="ct">共'+d.c+'条提示词</div><div class="ds">'+d.d+'</div>';
    g.appendChild(c);
  }
}
function rc() {
  var b = document.getElementById('cats'); b.innerHTML = '';
  var a = document.createElement('button'); a.className = fl==='all'?'on':''; a.textContent = '🎯 全部行业';
  a.onclick = function(){fl='all';sr='';document.getElementById('si').value='';rc();rd()}; b.appendChild(a);
  for (var i = 0; i < PROMPTS_DATA.length; i++) {
    var d = PROMPTS_DATA[i];
    var btn = document.createElement('button'); btn.className = fl===d.k?'on':''; btn.textContent = d.i+' '+d.n;
    btn.onclick = function(k){return function(){fl=k;sr='';document.getElementById('si').value='';rc();rd()}}(d.k);
    b.appendChild(btn);
  }
}
function gs() { sr = document.getElementById('si').value.trim(); fl = 'all'; rc(); rd(); }
function bk() { document.getElementById('det').style.display = 'none'; document.getElementById('main').style.display = 'block'; rd(); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function sd(key) {
  document.getElementById('main').style.display = 'none'; document.getElementById('det').style.display = 'block';
  var data = null; for (var i = 0; i < PROMPTS_DATA.length; i++) { if (PROMPTS_DATA[i].k === key) { data = PROMPTS_DATA[i]; break; } }
  if (!data) return;
  var items = data.items || [];
  document.getElementById('dt').innerHTML = data.i + ' ' + data.n + ' <span style="font-size:14px;color:#999;font-weight:400">共'+items.length+'条</span>';
  var list = document.getElementById('pl'); list.innerHTML = '';
  for (var i = 0; i < items.length; i++) {
    var p = items[i];
    var div = document.createElement('div'); div.className = 'it';
    var pt = document.createElement('div'); pt.className = 'pt'; pt.innerHTML = '<strong>'+esc(p[0])+'</strong>';
    var pre = document.createElement('pre'); pre.textContent = p[1];
    var btn = document.createElement('button'); btn.className = 'cp'; btn.textContent = '📋 复制';
    btn.onclick = function(pr,bn){return function(){
      navigator.clipboard.writeText(pr.textContent).then(function(){bn.textContent='✅ 已复制';bn.classList.add('dn');setTimeout(function(){bn.textContent='📋 复制';bn.classList.remove('dn')},2000)}).catch(function(){var ta=document.createElement('textarea');ta.value=pr.textContent;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);bn.textContent='✅ 已复制';bn.classList.add('dn');setTimeout(function(){bn.textContent='📋 复制';bn.classList.remove('dn')},2000)});
    }}(pre,btn);
    div.appendChild(pt); div.appendChild(pre); div.appendChild(btn);
    list.appendChild(div);
  }
}
rc(); rd();
</script>
</body>
</html>
