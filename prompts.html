function renderGrid() {
  var grid = document.getElementById('promptGrid');
  var items = DATA;
  if (FILTER !== 'all') items = items.filter(function(x) { return x.k === FILTER; });
  if (SEARCH) {
    var s = SEARCH.toLowerCase();
    items = items.filter(function(x) { return x.n.indexOf(s) >= 0 || x.d.indexOf(s) >= 0; });
  }
  if (items.length === 0) { grid.innerHTML = '<p style="color:#999;text-align:center;padding:40px">没有找到匹配的行业，换个关键词试试 😅</p>'; return; }
  var h = '';
  for (var i = 0; i < items.length; i++) {
    var d = items[i];
    h += '<div class="card" onclick="showDetailPage('' + d.k + '')"><span class="ico">' + d.i + '</span><h3>' + d.n + '</h3><div class="cnt">共 ' + d.c + ' 条提示词</div><div class="dsc">' + d.d + '</div><span class="badge">' + d.c + '条</span></div>';
  }
  grid.innerHTML = h;
}

function renderCatBar() {
  var bar = document.getElementById('catBar');
  var h = '<button class="cat-btn' + (FILTER === 'all' ? ' active' : '') + '" onclick="setFilter('all')">🎯 全部行业</button>';
  for (var i = 0; i < DATA.length; i++) {
    var d = DATA[i];
    h += '<button class="cat-btn' + (FILTER === d.k ? ' active' : '') + '" onclick="setFilter('' + d.k + '')">' + d.i + ' ' + d.n + '</button>';
  }
  bar.innerHTML = h;
}

function setFilter(k) { FILTER = k; SEARCH = ''; document.getElementById('sInp').value = ''; renderCatBar(); renderGrid(); }
function goSearch() { SEARCH = document.getElementById('sInp').value.trim(); FILTER = 'all'; renderCatBar(); renderGrid(); }
function showMainPage() { document.getElementById('mainPage').style.display = 'block'; document.getElementById('detailPage').style.display = 'none'; renderGrid(); }

function showDetailPage(key) {
  document.getElementById('mainPage').style.display = 'none';
  document.getElementById('detailPage').style.display = 'block';
  var data = null;
  for (var i = 0; i < DATA.length; i++) { if (DATA[i].k === key) { data = DATA[i]; break; } }
  if (!data) return;
  var items = DETAIL[key] || [];
  document.getElementById('detailTitle').innerHTML = data.i + ' ' + data.n + ' <span style="font-size:14px;color:#999;font-weight:400">共' + items.length + '条</span>';
  var h = '';
  for (var i = 0; i < items.length; i++) {
    var p = items[i];
    var txt = esc(p.x);
    h += '<div class="item"><div class="pt"><strong>' + esc(p.t) + '</strong> <span class="tag">' + esc(p.g) + '</span></div>';
    h += '<pre>' + txt.replace(/\n/g, '<br>') + '</pre>';
    h += '<button class="cp" onclick="cp(this)">📋 复制</button></div>';
  }
  document.getElementById('promptList').innerHTML = h;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/
/g,'<br>'); }

function cp(btn) {
  var pre = btn.parentElement.querySelector('pre');
  var txt = pre.textContent.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
  navigator.clipboard.writeText(txt).then(function() {
    btn.textContent = '✅ 已复制';
    btn.classList.add('done');
    setTimeout(function() { btn.textContent = '📋 复制'; btn.classList.remove('done'); }, 2000);
  }).catch(function() {
    // Fallback
    var ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✅ 已复制'; btn.classList.add('done');
    setTimeout(function() { btn.textContent = '📋 复制'; btn.classList.remove('done'); }, 2000);
  });
}
