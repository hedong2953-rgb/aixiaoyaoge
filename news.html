<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日AI资讯 - AI工具导航</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏮</text></svg>">
  <link rel="stylesheet" href="style.css">
  <style>
    .news-page { max-width: 900px; margin: 0 auto; padding: 32px 20px; }
    .news-hero { text-align: center; padding: 32px 0 24px; }
    .news-hero h1 { font-size: 28px; font-weight: 800; }
    .news-hero p { color: #64748b; font-size: 14px; margin-top: 6px; }
    .news-today { display: inline-block; padding: 4px 14px; background: #fef2f2; color: #ef4444; border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 16px; }
    .news-item { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 20px 24px; margin-bottom: 12px; transition: all .2s; }
    .news-item:hover { border-color: #c7d2fe; box-shadow: 0 2px 12px rgba(99,102,241,.08); }
    .news-tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; margin-bottom: 8px; }
    .news-tag.hot { background: #fef2f2; color: #ef4444; }
    .news-tag.new { background: #eef2ff; color: #6366f1; }
    .news-tag.tool { background: #f0fdf4; color: #16a34a; }
    .news-tag.company { background: #fff4e6; color: #f97316; }
    .news-item h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .news-item p { font-size: 14px; color: #64748b; line-height: 1.6; }
    .news-source { font-size: 12px; color: #94a3b8; margin-top: 8px; }
    .news-source a { color: #6366f1; text-decoration: none; }
    .news-source a:hover { text-decoration: underline; }
    .news-archive { margin-top: 32px; padding: 20px 24px; background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; }
    .news-archive h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
    .news-archive-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    .news-archive-item:last-child { border: none; }
    .news-archive-item a { color: #475569; text-decoration: none; }
    .news-archive-item a:hover { color: #6366f1; }
    .news-date { color: #94a3b8; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="index.html" class="header-logo">
        <span class="logo-icon">🏮</span>
        <span class="logo-text">AI工具导航</span>
      </a>
      <nav class="header-nav">
        <a href="index.html">首页</a>
        <a href="#categories">分类</a>
        <a href="news.html" style="background:#eef2ff;color:#6366f1">AI资讯</a>
        <a href="submit.html">提交收录</a>
        <a href="about.html">关于</a>
      </nav>
    </div>
  </header>

  <section class="news-page">
    <div class="news-hero">
      <div class="news-today">📰 每日AI资讯</div>
      <h1>AI 行业最新动态</h1>
      <p>每天更新，掌握AI行业最新资讯</p>
    </div>

    <div id="newsContainer"></div>

    <div class="news-archive">
      <h3>📅 历史资讯</h3>
      <div id="newsArchive"></div>
    </div>
  </section>

  <footer>
    <div class="footer-inner">
      <div class="footer-col">
        <div class="footer-logo">🏮 AI工具导航</div>
        <p class="footer-desc">一站式AI工具大全，发现好用的AI工具和资源。</p>
      </div>
      <div class="footer-col">
        <h4>快速链接</h4>
        <a href="index.html">首页</a>
        <a href="#categories">全部分类</a>
        <a href="news.html">AI资讯</a>
        <a href="submit.html">提交收录</a>
        <a href="about.html">关于我们</a>
      </div>
      <div class="footer-col">
        <h4>热门分类</h4>
        <a href="index.html">对话大模型</a>
        <a href="index.html">AI绘图</a>
        <a href="index.html">AI视频</a>
        <a href="index.html">AI编程</a>
      </div>
      <div class="footer-col">
        <h4>关于我们</h4>
        <p>一点一滴，打造最强AI导航站</p>
        <p class="footer-copy">© 2026 aixiaoyaoge.top</p>
      </div>
    </div>
  </footer>

  <script src="data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('newsContainer');
      const archiveEl = document.getElementById('newsArchive');

      if (!window.aiNews || window.aiNews.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:48px;color:#94a3b8">暂无资讯，请稍后再来查看</div>';
        return;
      }

      // Show today's news
      const today = new Date();
      const dateStr = today.toISOString().split('T')[0];
      const todayNews = window.aiNews.filter(n => n.date === dateStr);
      const showNews = todayNews.length > 0 ? todayNews : window.aiNews.slice(0, 5);

      container.innerHTML = showNews.map(n => `
        <div class="news-item">
          <span class="news-tag ${n.tagClass || 'new'}">${n.tag || '资讯'}</span>
          <h3>${n.title}</h3>
          <p>${n.summary}</p>
          ${n.url ? `<div class="news-source">来源: <a href="${n.url}" target="_blank">${n.source || '网络'}</a></div>` : ''}
        </div>
      `).join('');

      // Archive
      const dates = [...new Set(window.aiNews.map(n => n.date))].sort().reverse().slice(0, 7);
      if (dates.length > 0) {
        archiveEl.innerHTML = dates.map(d => {
          const count = window.aiNews.filter(n => n.date === d).length;
          return `<div class="news-archive-item"><span>${d}</span><span style="color:#94a3b8">${count} 条资讯</span></div>`;
        }).join('');
      } else {
        archiveEl.parentElement.style.display = 'none';
      }
    });
  </script>
</body>
</html>
