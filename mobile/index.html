<!DOCTYPE html>
<html lang="zh-cn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>逍遥搜AI — 手机版</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏮</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Color Emoji", sans-serif; background: #f0f2f5; color: #1e293b; font-size: 17px; -webkit-text-size-adjust: 100%; }

/* Top bar */
.mobile-top { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); padding: 14px 14px 12px; position: sticky; top: 0; z-index: 100; }
.mobile-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.mobile-logo { font-size: 20px; font-weight: 800; color: #e8d5ff; text-decoration: none; }
.mobile-top-link { padding: 8px 14px; border: 1px solid rgba(255,255,255,.2); border-radius: 8px; color: rgba(255,255,255,.85); text-decoration: none; font-size: 15px; }

/* Search */
.search-box { margin: 0 0 8px; }
.search-box input { width: 100%; padding: 14px 16px; border: none; border-radius: 10px; font-size: 17px; outline: none; background: rgba(255,255,255,.15); color: #fff; }
.search-box input::placeholder { color: rgba(255,255,255,.5); }
.search-box input:focus { background: rgba(255,255,255,.25); }

/* Category tabs - horizontal scroll full width */
.cat-tabs { display: flex; gap: 6px; overflow-x: auto; padding: 8px 0 6px; scrollbar-width: none; -ms-overflow-style: none; }
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab { padding: 8px 16px; border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; font-size: 15px; color: #475569; white-space: nowrap; }
.cat-tab.active { background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; border-color: transparent; }

/* Tool list */
.tool-list { padding: 10px 0 80px; }
.tool-item { display: flex; gap: 12px; padding: 14px; margin: 0 10px 10px; background: #fff; border-radius: 12px; text-decoration: none; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.tool-item:hover { box-shadow: 0 2px 8px rgba(99,102,241,.08); }
.t-icon { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg,#f5f3ff,#ede9fe); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.t-body { min-width: 0; flex: 1; }
.t-name { font-size: 17px; font-weight: 600; color: #1a202c; }
.t-badge { display: inline-block; padding: 2px 8px; background: linear-gradient(135deg,#eef2ff,#e0e7ff); color: #6366f1; border-radius: 5px; font-size: 12px; font-weight: 600; margin-left: 6px; vertical-align: middle; }
.t-desc { font-size: 14px; color: #64748b; line-height: 1.4; margin-top: 3px; }

/* No result */
.empty { text-align: center; padding: 50px; color: #94a3b8; font-size: 17px; }

/* Bottom nav - full width */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e2e8f0; display: flex; z-index: 100; padding: 6px 0; box-shadow: 0 -2px 8px rgba(0,0,0,.04); }
.bottom-nav a { flex: 1; text-align: center; padding: 8px; color: #64748b; text-decoration: none; font-size: 14px; }
.bottom-nav a:first-child { color: #6366f1; font-weight: 600; }
</style>
</head>
<body>

<div class="mobile-top">
  <div class="mobile-header">
    <a href="/" class="mobile-logo">🏮 逍遥搜AI</a>
    <a href="/news.html" class="mobile-top-link">📰 AI资讯</a>
  </div>
  <div class="search-box">
    <input id="searchInput" type="text" placeholder="搜索AI工具..." oninput="app.filter()">
  </div>
  <div id="catTabs" class="cat-tabs"></div>
</div>

<div id="toolList" class="tool-list"></div>

<div class="bottom-nav">
  <a href="/">🏠 首页</a>
  <a href="/categories.html">📂 分类</a>
  <a href="/news.html">📰 资讯</a>
  <a href="/about.html">ℹ️ 关于</a>
</div>

<script src="../data.js"></script>
<script>
var app = {
  currentCat: 'all',
  currentSearch: '',
  cats: [
    { id: 'all', label: '全部' },
    { id: 'writing', label: '写作' },
    { id: 'image', label: '图像' },
    { id: 'video', label: '视频' },
    { id: 'productivity', label: '办公' },
    { id: 'conversation', label: '聊天' },
    { id: 'coding', label: '编程' },
    { id: 'design', label: '设计' },
    { id: 'audio', label: '音频' },
    { id: 'search', label: '搜索' },
    { id: 'platform', label: '开发' },
    { id: 'learning', label: '学习' },
    { id: 'model', label: '模型' },
    { id: 'resource', label: '资源' },
    { id: 'agent', label: '智能体' },
    { id: 'detect', label: '检测' },
    { id: 'prompt', label: '提示' },
    { id: 'side-project', label: '副业' }
  ],

  init: function() {
    this.renderTabs();
    this.render();
  },

  renderTabs: function() {
    var h = '';
    for(var i = 0; i < this.cats.length; i++) {
      var c = this.cats[i];
      h += '<span class="cat-tab' + (c.id === 'all' ? ' active' : '') + '" data-cat="' + c.id + '">' + c.label + '</span>';
    }
    document.getElementById('catTabs').innerHTML = h;
    var tabs = document.getElementById('catTabs');
    tabs.onclick = function(e) {
      var tab = e.target.closest('.cat-tab');
      if(!tab) return;
      var cats = document.querySelectorAll('.cat-tab');
      for(var i = 0; i < cats.length; i++) cats[i].classList.remove('active');
      tab.classList.add('active');
      app.currentCat = tab.dataset.cat;
      app.currentSearch = '';
      document.getElementById('searchInput').value = '';
      app.render();
    };
  },

  filter: function() {
    this.currentSearch = document.getElementById('searchInput').value.trim().toLowerCase();
    this.render();
  },

  render: function() {
    var container = document.getElementById('toolList');
    var search = this.currentSearch;
    var items = [];

    for(var i = 0; i < toolsData.length; i++) {
      var t = toolsData[i];
      var matchCat = this.currentCat === 'all' || t.category === this.currentCat;
      var matchSearch = true;
      if(search) {
        matchSearch = t.name.toLowerCase().indexOf(search) >= 0 || t.desc.toLowerCase().indexOf(search) >= 0;
      }
      if(matchCat && matchSearch) items.push(t);
    }

    if(items.length === 0) {
      container.innerHTML = '<div class="empty">没有找到对应的工具</div>';
      return;
    }

    var h = '';
    for(var i = 0; i < items.length; i++) {
      var t = items[i];
      var label = t.categoryLabel || '';
      h += '<a class="tool-item" href="' + (t.url || '#') + '" target="_blank" rel="noopener">';
      h += '<div class="t-icon">' + t.icon + '</div>';
      h += '<div class="t-body">';
      h += '<div class="t-name">' + t.name + '<span class="t-badge">' + label + '</span></div>';
      h += '<div class="t-desc">' + t.desc + '</div>';
      h += '</div></a>';
    }
    container.innerHTML = h;
  }
};

document.addEventListener('DOMContentLoaded', function() { app.init(); });
</script>
</body>
</html>
