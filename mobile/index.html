<!DOCTYPE html>
<html lang="zh-cn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>逍遥搜AI — 手机版</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏮</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f2f4f7; color: #1e293b; font-size: 14px; -webkit-text-size-adjust: 100%; }

/* Top bar */
.mobile-top { background: #fff; padding: 10px 12px 0; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
.mobile-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.mobile-logo { font-size: 16px; font-weight: 700; color: #6366f1; text-decoration: none; }
.mobile-top-link { padding: 4px 10px; border: 1px solid #e2e8f0; border-radius: 6px; color: #475569; text-decoration: none; font-size: 12px; }

/* Search */
.search-box { margin: 8px 0; }
.search-box input { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 15px; outline: none; background: #fff; }
.search-box input:focus { border-color: #6366f1; }

/* Category tabs - horizontal scroll */
.cat-tabs { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 6px; scrollbar-width: none; -ms-overflow-style: none; }
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab { padding: 5px 12px; border: 1px solid #e2e8f0; border-radius: 16px; background: #fff; font-size: 12px; color: #475569; white-space: nowrap; }
.cat-tab.active { background: #6366f1; color: #fff; border-color: #6366f1; }

/* Tool list */
.scroll-wrap { overflow-y: auto; -webkit-overflow-scrolling: touch; }
.tool-list { padding: 8px 12px 60px; }
.tool-item { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f1f5f9; text-decoration: none; }
.tool-item:last-child { border: none; }
.t-icon { width: 36px; height: 36px; border-radius: 8px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.t-body { min-width: 0; }
.t-name { font-size: 14px; font-weight: 600; color: #1a202c; }
.t-badge { display: inline-block; padding: 1px 6px; background: #eef2ff; color: #6366f1; border-radius: 4px; font-size: 10px; margin-left: 4px; vertical-align: middle; }
.t-desc { font-size: 12px; color: #64748b; line-height: 1.3; margin-top: 1px; }

/* No result */
.empty { text-align: center; padding: 30px; color: #94a3b8; font-size: 13px; }

/* Bottom nav */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e2e8f0; display: flex; z-index: 100; padding: 4px 0; }
.bottom-nav a { flex: 1; text-align: center; padding: 6px; color: #64748b; text-decoration: none; font-size: 10px; }
.bottom-nav a:first-child { color: #6366f1; font-weight: 600; }
</style>
</head>
<body>

<div class="mobile-top">
  <div class="mobile-header">
    <a href="/" class="mobile-logo">🏮 逍遥搜AI</a>
    <a href="https://ai-bot.cn/daily-ai-news/" class="mobile-top-link" target="_blank">📰 资讯</a>
  </div>
  <div class="search-box">
    <input id="searchInput" type="text" placeholder="搜索AI工具..." oninput="app.filter()">
  </div>
  <div id="catTabs" class="cat-tabs"></div>
</div>

<div class="scroll-wrap">
  <div id="toolList" class="tool-list"></div>
</div>

<div class="bottom-nav">
  <a href="/">🏠 首页</a>
  <a href="https://ai-bot.cn/ai-tools/" target="_blank">🔍 发现</a>
  <a href="https://ai-bot.cn/favorites/ai-writing-tools/" target="_blank">✍️ 写作</a>
  <a href="https://ai-bot.cn/favorites/ai-image-tools/" target="_blank">🎨 绘图</a>
  <a href="https://ai-bot.cn/favorites/ai-video-tools/" target="_blank">🎬 视频</a>
</div>

<script src="../data.js"></script>
<script>
var app = {
  currentCat: 'all',
  currentSearch: '',
  cats: [
    { id: 'all', label: '全部' },
    { id: 'writing', label: '写作' },
    { id: 'image', label: '图像' },
    { id: 'video', label: '视频' },
    { id: 'productivity', label: '办公' },
    { id: 'agent', label: '智能体' },
    { id: 'conversation', label: '聊天' },
    { id: 'coding', label: '编程' },
    { id: 'design', label: '设计' },
    { id: 'audio', label: '音频' },
    { id: 'search', label: '搜索' },
    { id: 'platform', label: '开发' },
    { id: 'learning', label: '学习' },
    { id: 'model', label: '模型' },
    { id: 'detect', label: '检测' },
    { id: 'prompt', label: '提示' },
    { id: 'side-project', label: '副业' },
    { id: 'resource', label: '资源' }
  ],

  init: function() {
    this.renderTabs();
    this.render();
  },

  renderTabs: function() {
    var h = '';
    for(var i = 0; i < this.cats.length; i++) {
      var c = this.cats[i];
      h += '<span class="cat-tab' + (c.id === 'all' ? ' active' : '') + '" data-cat="' + c.id + '">' + c.label + '</span>';
    }
    document.getElementById('catTabs').innerHTML = h;
    var tabs = document.getElementById('catTabs');
    tabs.onclick = function(e) {
      var tab = e.target.closest('.cat-tab');
      if(!tab) return;
      var cats = document.querySelectorAll('.cat-tab');
      for(var i = 0; i < cats.length; i++) cats[i].classList.remove('active');
      tab.classList.add('active');
      app.currentCat = tab.dataset.cat;
      app.currentSearch = '';
      document.getElementById('searchInput').value = '';
      app.render();
    };
  },

  filter: function() {
    this.currentSearch = document.getElementById('searchInput').value.trim().toLowerCase();
    this.render();
  },

  render: function() {
    var container = document.getElementById('toolList');
    var search = this.currentSearch;
    var items = [];

    for(var i = 0; i < toolsData.length; i++) {
      var t = toolsData[i];
      var matchCat = this.currentCat === 'all' || t.category === this.currentCat;
      var matchSearch = true;
      if(search) {
        matchSearch = t.name.toLowerCase().indexOf(search) >= 0 || t.desc.toLowerCase().indexOf(search) >= 0;
      }
      if(matchCat && matchSearch) items.push(t);
    }

    if(items.length === 0) {
      container.innerHTML = '<div class="empty">没有找到对应的工具</div>';
      return;
    }

    var h = '';
    for(var i = 0; i < items.length; i++) {
      var t = items[i];
      var label = t.categoryLabel || '';
      h += '<a class="tool-item" href="' + (t.url || '#') + '" target="_blank">';
      h += '<div class="t-icon">' + t.icon + '</div>';
      h += '<div class="t-body">';
      h += '<div class="t-name">' + t.name + '<span class="t-badge">' + label + '</span></div>';
      h += '<div class="t-desc">' + t.desc + '</div>';
      h += '</div></a>';
    }
    container.innerHTML = h;
  }
};

document.addEventListener('DOMContentLoaded', function() { app.init(); });
</script>
</body>
</html>
